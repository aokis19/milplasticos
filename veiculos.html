<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Veículos | Mil Plásticos</title>
  
  <!-- CSS Principal -->
  <link rel="stylesheet" href="/milplasticos/assets/css/main.css">
  <link rel="stylesheet" href="/milplasticos/assets/css/sidebar.css">
  <link rel="stylesheet" href="/milplasticos/assets/css/topbar.css">
  <link rel="stylesheet" href="/milplasticos/assets/css/veiculos.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Topbar Container -->
  <div id="topbar-container"></div>
  
  <!-- Container principal (sidebar + conteúdo) -->
  <div class="container">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Conteúdo principal -->
    <main class="main-content">
      
      <div class="page-container">
        
        <!-- Cabeçalho da página -->
        <div class="page-header">
          <h1><i class="fas fa-truck"></i> Cadastro de Veículos</h1>
          <p>Gerencie sua frota de veículos</p>
          <div class="page-actions">
            <button class="btn btn-secondary" id="btnExport">
              <i class="fas fa-file-export"></i> Exportar
            </button>
            <button class="btn btn-primary" id="btnRelatorio">
              <i class="fas fa-chart-bar"></i> Relatório
            </button>
          </div>
        </div>
        
        <!-- Card do Formulário -->
        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-plus-circle"></i> Novo Veículo</h2>
          </div>
          <div class="card-body">
            <form id="formVeiculo">
              <div class="form-grid">
                <div class="form-group">
                  <label for="placa">
                    <i class="fas fa-car"></i> Placa *
                    <span class="hint">Formato: ABC-1D23</span>
                  </label>
                  <input type="text" id="placa" maxlength="8" placeholder="AAA-0000" required>
                  <div class="error-message" id="placaError"></div>
                </div>

                <div class="form-group">
                  <label for="modelo"><i class="fas fa-car-side"></i> Modelo *</label>
                  <input type="text" id="modelo" placeholder="Ex: Ford Ranger" required>
                </div>

                <div class="form-group">
                  <label for="renavam"><i class="fas fa-id-card"></i> Renavam *</label>
                  <input type="text" id="renavam" maxlength="11" placeholder="00000000000" required>
                  <div class="error-message" id="renavamError"></div>
                </div>

                <div class="form-group">
                  <label for="ano"><i class="fas fa-calendar-alt"></i> Ano</label>
                  <input type="number" id="ano" min="1900" max="2030" placeholder="2024">
                </div>

                <div class="form-group">
                  <label for="cor"><i class="fas fa-palette"></i> Cor</label>
                  <input type="text" id="cor" placeholder="Preto, Branco, etc.">
                </div>

                <div class="form-group">
                  <label for="medidor"><i class="fas fa-tachometer-alt"></i> Medidor *</label>
                  <select id="medidor" required>
                    <option value="">Selecione...</option>
                    <option value="Hora">Hora</option>
                    <option value="Km">Quilômetro (Km)</option>
                    <option value="Outro">Outro</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="combustivel"><i class="fas fa-gas-pump"></i> Combustível *</label>
                  <select id="combustivel" required>
                    <option value="">Selecione...</option>
                    <option value="Gasolina">Gasolina</option>
                    <option value="Etanol">Etanol</option>
                    <option value="Diesel S10">Diesel S10</option>
                    <option value="Diesel S500">Diesel S500</option>
                    <option value="Flex">Flex</option>
                    <option value="Eletrico">Elétrico</option>
                    <option value="Hibrido">Híbrido</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="status"><i class="fas fa-circle"></i> Status</label>
                  <select id="status">
                    <option value="Ativo">Ativo</option>
                    <option value="Manutenção">Em Manutenção</option>
                    <option value="Inativo">Inativo</option>
                  </select>
                </div>
              </div>

              <div class="form-footer">
                <button type="button" class="btn btn-clear" id="btnLimpar">
                  <i class="fas fa-broom"></i> Limpar
                </button>
                <button type="submit" class="btn btn-success">
                  <i class="fas fa-save"></i> Cadastrar Veículo
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Card da Tabela -->
        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-list"></i> Veículos Cadastrados</h2>
            <div class="table-actions">
              <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="filterInput" placeholder="Filtrar veículos...">
              </div>
              <span class="badge" id="totalVeiculos">0 veículos</span>
            </div>
          </div>
          <div class="card-body table-responsive">
            <table id="tabelaVeiculos">
              <thead>
                <tr>
                  <th><i class="fas fa-car"></i> Placa</th>
                  <th><i class="fas fa-car-side"></i> Modelo</th>
                  <th><i class="fas fa-id-card"></i> Renavam</th>
                  <th><i class="fas fa-calendar-alt"></i> Ano</th>
                  <th><i class="fas fa-tachometer-alt"></i> Medidor</th>
                  <th><i class="fas fa-gas-pump"></i> Combustível</th>
                  <th><i class="fas fa-circle"></i> Status</th>
                  <th><i class="fas fa-cogs"></i> Ações</th>
                </tr>
              </thead>
              <tbody id="tabelaBody">
                <!-- Dados serão carregados via JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Modal de Confirmação -->
        <div id="confirmModal" class="modal">
          <div class="modal-content">
            <h3><i class="fas fa-exclamation-triangle"></i> Confirmar Exclusão</h3>
            <p>Tem certeza que deseja excluir o veículo <strong id="placaExcluir"></strong>?</p>
            <div class="modal-actions">
              <button class="btn btn-secondary" id="btnCancelar">Cancelar</button>
              <button class="btn btn-danger" id="btnConfirmarExcluir">Excluir</button>
            </div>
          </div>
        </div>

      </div> <!-- Fim do page-container -->
      
    </main> <!-- Fim do main-content -->
    
  </div> <!-- Fim do container -->
  
  <!-- Script principal (carrega sidebar/topbar) -->
  <script src="/milplasticos/js/main.js"></script>
  <!-- Script específico da página -->
  <script src="/milplasticos/js/veiculo.js"></script>
</body>
</html>
