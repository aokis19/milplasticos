    <style>
        /* Estilos complementares do modal */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }

    </style>
</head>

    <script>
        let modalInicializado = false;

        function iniciarSistema() {
            if (modalInicializado) return;
            if (typeof window.db === 'undefined') {
                setTimeout(iniciarSistema, 500);
                return;
            }
            modalInicializado = true;

            // Variáveis globais
            let materiaisCadastrados = [];
            let fornecedoresCadastrados = [];
            let fechamentos = [];
            let folhaEditandoId = null;

            // Elementos DOM
            const materiaisListDiv = document.getElementById('materiaisList');
            const addMaterialBtn = document.getElementById('addMaterialBtn');
            const somaMateriaisSpan = document.getElementById('somaMateriais');
            const comparativoDiv = document.getElementById('comparativoDiv');
            const listaFechamentosDiv = document.getElementById('listaFechamentos');

            function mostrarAlerta(mensagem, tipo = 'erro') {
                const alerta = document.getElementById('alertaFlutuante');
                const mensagemSpan = document.getElementById('mensagemAlerta');
                mensagemSpan.textContent = mensagem;
                alerta.classList.remove('sucesso');
                if (tipo === 'sucesso') alerta.classList.add('sucesso');
                alerta.classList.add('show');
                setTimeout(() => {
                    alerta.classList.remove('show');
                    alerta.classList.remove('sucesso');
                }, 4000);
            }

            function formatarNumero(valor) {
                return Math.round(valor);
            }

            async function carregarFornecedores() {
                try {
                    const q = query(collection(window.db, "fornecedores"), orderBy("nome"));
                    const querySnapshot = await getDocs(q);
                    fornecedoresCadastrados = [];
                    querySnapshot.forEach((doc) => {
                        fornecedoresCadastrados.push({ id: doc.id, nome: doc.data().nome });
                    });
                    atualizarSelectFornecedores();
                } catch (error) {
                    console.error("Erro ao carregar fornecedores:", error);
                }
            }

            function atualizarSelectFornecedores() {
                const selects = ['fornecedorSelect', 'fechamentoFornecedor'];
                selects.forEach(selectId => {
                    const select = document.getElementById(selectId);
                    if (select) {
                        select.innerHTML = '<option value="">Selecione um fornecedor</option>';
                        fornecedoresCadastrados.forEach(forn => {
                            const option = document.createElement('option');
                            option.value = forn.nome;
                            option.textContent = forn.nome;
                            select.appendChild(option);
                        });
                    }
                });
            }

            async function carregarMateriais() {
                try {
                    const q = query(collection(window.db, "materiais"), orderBy("nome"));
                    const querySnapshot = await getDocs(q);
                    materiaisCadastrados = [];
                    querySnapshot.forEach((doc) => {
                        materiaisCadastrados.push({ id: doc.id, nome: doc.data().nome });
                    });
                    atualizarSelectsMateriais();
                } catch (error) {
                    console.error("Erro ao carregar materiais:", error);
                }
            }

            function atualizarSelectsMateriais() {
                const selects = document.querySelectorAll('.material-select');
                selects.forEach(select => {
                    const valorAtual = select.value;
                    select.innerHTML = '<option value="">Selecione um material</option>';
                    materiaisCadastrados.forEach(mat => {
                        const option = document.createElement('option');
                        option.value = mat.nome;
                        option.textContent = mat.nome;
                        if (valorAtual === mat.nome) option.selected = true;
                        select.appendChild(option);
                    });
                });
            }

            function adicionarCampoPeso(pesosList, cardId, valorInicial = '') {
                const pesoDiv = document.createElement('div');
                pesoDiv.className = 'peso-item';
                pesoDiv.innerHTML = `
                    <input type="number" step="1" placeholder="Peso (kg)" class="peso-input" data-card="${cardId}" value="${valorInicial}">
                    <button type="button" class="btn-remove-peso"><i class="fas fa-times"></i> Remover</button>
                `;
                const pesoInput = pesoDiv.querySelector('.peso-input');
                const removePesoBtn = pesoDiv.querySelector('.btn-remove-peso');
                pesoInput.addEventListener('input', () => calcularSomaFolha());
                removePesoBtn.addEventListener('click', () => {
                    pesoDiv.remove();
                    calcularSomaFolha();
                });
                pesosList.appendChild(pesoDiv);
                calcularSomaFolha();
            }

            function criarMaterialCard(materialNome = '', pesos = []) {
                const cardId = Date.now() + Math.random();
                const div = document.createElement('div');
                div.className = 'material-card';
                div.dataset.id = cardId;
                div.innerHTML = `
                    <div class="material-header">
                        <select class="material-select" data-id="${cardId}">
                            <option value="">Selecione um material</option>
                            ${materiaisCadastrados.map(m => `<option value="${m.nome}" ${materialNome === m.nome ? 'selected' : ''}>${m.nome}</option>`).join('')}
                        </select>
                        <button type="button" class="btn-remove-material"><i class="fas fa-trash"></i> Remover Material</button>
                    </div>
                    <div class="pesos-container" data-card="${cardId}">
                        <div class="pesos-list"></div>
                        <button type="button" class="btn-add-peso"><i class="fas fa-plus"></i> Incluir Peso</button>
                    </div>
                    <div class="material-total" data-total="${cardId}">Total do Material: 0 kg</div>
                `;
                const select = div.querySelector('.material-select');
                const removeBtn = div.querySelector('.btn-remove-material');
                const addPesoBtn = div.querySelector('.btn-add-peso');
                const pesosList = div.querySelector('.pesos-list');
                if (pesos.length > 0) {
                    pesos.forEach(peso => adicionarCampoPeso(pesosList, cardId, peso));
                } else {
                    adicionarCampoPeso(pesosList, cardId);
                }
                select.addEventListener('change', () => calcularSomaFolha());
                removeBtn.addEventListener('click', () => {
                    div.remove();
                    calcularSomaFolha();
                });
                addPesoBtn.addEventListener('click', () => adicionarCampoPeso(pesosList, cardId));
                return div;
            }

            function calcularSomaFolha() {
                let somaTotalGeral = 0;
                const cards = document.querySelectorAll('#materiaisList .material-card');
                cards.forEach(card => {
                    const pesos = card.querySelectorAll('.peso-input');
                    let somaMaterial = 0;
                    pesos.forEach(pesoInput => {
                        somaMaterial += parseFloat(pesoInput.value) || 0;
                    });
                    somaTotalGeral += somaMaterial;
                    const totalSpan = card.querySelector('.material-total');
                    if (totalSpan) totalSpan.textContent = `Total do Material: ${formatarNumero(somaMaterial)} kg`;
                });
                somaMateriaisSpan.textContent = formatarNumero(somaTotalGeral);
                const pesoBalancao = parseFloat(document.getElementById('folhaPesoBalancao').value) || 0;
                const diferenca = somaTotalGeral - pesoBalancao;
                let htmlComparativo = `<strong>📊 Comparativo</strong><br>Peso Balança: ${formatarNumero(pesoBalancao)} kg | Soma: ${formatarNumero(somaTotalGeral)} kg<br>`;
                if (pesoBalancao > 0) {
                    const diferencaPercentual = (Math.abs(diferenca) / pesoBalancao) * 100;
                    htmlComparativo += `Diferença: ${diferenca >= 0 ? '+' : ''}${formatarNumero(Math.abs(diferenca))} kg (${diferencaPercentual.toFixed(1)}% variação)<br>`;
                    if (diferencaPercentual <= 5) {
                        comparativoDiv.className = 'comparativo verde';
                        htmlComparativo += '✅ COMPATÍVEL: Dentro da tolerância de 5%';
                    } else {
                        comparativoDiv.className = 'comparativo vermelho';
                        htmlComparativo += '❌ INCOMPATÍVEL: Variação superior a 5%';
                    }
                } else {
                    comparativoDiv.className = 'comparativo';
                    htmlComparativo += '⚠️ Informe o peso da balança';
                }
                comparativoDiv.innerHTML = htmlComparativo;
            }

            async function gerarPDFFechamento(fechamentoId) {
                const docRef = doc(window.db, "fechamentos", fechamentoId);
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) return;

                const fechamento = docSnap.data();
                const { jsPDF } = window.jspdf;
                const pdfDoc = new jsPDF();

                pdfDoc.setFillColor(44, 62, 80);
                pdfDoc.rect(0, 0, 210, 45, 'F');
                pdfDoc.setTextColor(255, 255, 255);
                pdfDoc.setFontSize(18);
                pdfDoc.setFont("helvetica", "bold");
                pdfDoc.text('MIL PLÁSTICOS', 20, 25);
                pdfDoc.setFontSize(10);
                pdfDoc.text('Relatório Consolidado de Fechamento', 20, 35);
                pdfDoc.text(`Data: ${new Date().toLocaleString('pt-BR')}`, 20, 42);

                pdfDoc.setDrawColor(200, 200, 200);
                pdfDoc.line(20, 50, 190, 50);

                pdfDoc.setTextColor(0, 0, 0);
                pdfDoc.setFontSize(12);
                pdfDoc.setFont("helvetica", "bold");
                pdfDoc.text(`FECHAMENTO: ${fechamento.nome}`, 20, 65);
                pdfDoc.setFontSize(10);
                pdfDoc.setFont("helvetica", "normal");
                pdfDoc.text(`Fornecedor: ${fechamento.fornecedor}`, 20, 75);
                pdfDoc.text(`Total de Folhas: ${fechamento.folhas.length}`, 20, 83);

                let y = 100;
                let somaGeralTodosMateriais = 0;
                const consolidadoMateriais = {};

                for (let i = 0; i < fechamento.folhas.length; i++) {
                    const folha = fechamento.folhas[i];
                    if (y > 260) {
                        pdfDoc.addPage();
                        y = 20;
                    }

                    pdfDoc.setFontSize(11);
                    pdfDoc.setFont("helvetica", "bold");
                    pdfDoc.setTextColor(52, 73, 94);
                    pdfDoc.text(`Folha ${i + 1} - ${new Date(folha.data).toLocaleDateString('pt-BR')}`, 20, y);
                    y += 7;

                    pdfDoc.setFontSize(9);
                    pdfDoc.setFont("helvetica", "normal");
                    pdfDoc.text(`Peso Balança: ${formatarNumero(folha.pesoBalancao)} kg | Estado: ${folha.estado}`, 25, y);
                    y += 6;

                    pdfDoc.text('Materiais:', 25, y);
                    y += 5;

                    folha.materiais.forEach(mat => {
                        if (y > 270) {
                            pdfDoc.addPage();
                            y = 20;
                        }
                        const pesosStr = mat.pesos.map(p => formatarNumero(p)).join(' + ');
                        pdfDoc.text(`  • ${mat.nome}: ${pesosStr} = ${formatarNumero(mat.pesoTotal)} kg`, 30, y);
                        y += 5;
                        somaGeralTodosMateriais += mat.pesoTotal;

                        if (consolidadoMateriais[mat.nome]) {
                            consolidadoMateriais[mat.nome] += mat.pesoTotal;
                        } else {
                            consolidadoMateriais[mat.nome] = mat.pesoTotal;
                        }
                    });
                    y += 5;
                }

                y += 10;
                pdfDoc.setDrawColor(200, 200, 200);
                pdfDoc.line(20, y, 190, y);
                y += 8;

                pdfDoc.setFontSize(11);
                pdfDoc.setFont("helvetica", "bold");
                pdfDoc.setTextColor(44, 62, 80);
                pdfDoc.text('RESUMO CONSOLIDADO', 20, y);
                y += 8;

                pdfDoc.setFontSize(9);
                pdfDoc.setFont("helvetica", "normal");
                pdfDoc.text(`Peso Total Processado: ${formatarNumero(somaGeralTodosMateriais)} kg`, 25, y);
                y += 6;

                pdfDoc.text('Total por Material:', 25, y);
                y += 5;

                for (const [material, peso] of Object.entries(consolidadoMateriais)) {
                    if (y > 270) {
                        pdfDoc.addPage();
                        y = 20;
                    }
                    pdfDoc.text(`  • ${material}: ${formatarNumero(peso)} kg`, 30, y);
                    y += 5;
                }

                y += 10;
                pdfDoc.setFontSize(8);
                pdfDoc.setTextColor(150, 150, 150);
                pdfDoc.text('Documento gerado pelo Sistema Mil Plásticos', 20, y + 6);
                pdfDoc.text(`Total de folhas: ${fechamento.folhas.length} | Status: ${fechamento.status}`, 20, y + 12);

                const pdfBase64 = pdfDoc.output('datauristring');
                await updateDoc(docRef, { pdfGerado: pdfBase64, concluido: true, dataConclusao: new Date().toISOString() });

                const link = document.createElement('a');
                link.href = pdfBase64;
                link.download = `fechamento_${fechamento.nome.replace(/\s/g, '_')}.pdf`;
                link.click();

                mostrarAlerta('PDF gerado e fechamento concluído!', 'sucesso');
                await carregarFechamentos();
            }

            async function salvarFolha() {
                const fechamentoId = document.getElementById('fechamentoAtualId').value;
                const folhaData = document.getElementById('folhaData').value;
                const folhaPesoBalancao = parseFloat(document.getElementById('folhaPesoBalancao').value) || 0;
                const folhaEstado = document.getElementById('folhaEstado').value;

                if (!folhaData) { mostrarAlerta('Selecione a data da folha'); return; }
                if (!folhaEstado) { mostrarAlerta('Selecione o estado do material'); return; }

                const cards = document.querySelectorAll('#materiaisList .material-card');
                const materiais = [];
                cards.forEach(card => {
                    const select = card.querySelector('.material-select');
                    const materialNome = select ? select.value : '';
                    const pesos = card.querySelectorAll('.peso-input');
                    let somaMaterial = 0;
                    const pesosLista = [];
                    pesos.forEach(pesoInput => {
                        const peso = parseFloat(pesoInput.value) || 0;
                        somaMaterial += peso;
                        if (peso > 0) pesosLista.push(peso);
                    });
                    if (materialNome && somaMaterial > 0) {
                        materiais.push({ nome: materialNome, pesoTotal: somaMaterial, pesos: pesosLista });
                    }
                });

                if (materiais.length === 0) { mostrarAlerta('Adicione pelo menos um material'); return; }

                const novaFolha = {
                    id: Date.now().toString(),
                    data: folhaData,
                    pesoBalancao: folhaPesoBalancao,
                    estado: folhaEstado,
                    materiais: materiais,
                    dataCriacao: new Date().toISOString()
                };

                const fechamentoRef = doc(window.db, "fechamentos", fechamentoId);
                const fechamentoSnap = await getDoc(fechamentoRef);
                if (fechamentoSnap.exists()) {
                    const fechamento = fechamentoSnap.data();
                    const folhasAtuais = fechamento.folhas || [];

                    if (folhaEditandoId) {
                        const index = folhasAtuais.findIndex(f => f.id === folhaEditandoId);
                        if (index !== -1) folhasAtuais[index] = novaFolha;
                        folhaEditandoId = null;
                    } else {
                        folhasAtuais.push(novaFolha);
                    }

                    await updateDoc(fechamentoRef, { folhas: folhasAtuais });
                    mostrarAlerta('Folha salva com sucesso!', 'sucesso');
                    fecharModalFolha();
                    await carregarFechamentos();
                }
            }

            async function carregarFechamentos() {
                listaFechamentosDiv.innerHTML = '<p>Carregando...</p>';
                try {
                    const q = query(collection(window.db, "fechamentos"), orderBy("dataCriacao", "desc"));
                    const querySnapshot = await getDocs(q);
                    if (querySnapshot.empty) {
                        listaFechamentosDiv.innerHTML = '<p>Nenhum fechamento encontrado. Clique em "Novo Fechamento" para começar.</p>';
                        return;
                    }

                    listaFechamentosDiv.innerHTML = '';
                    for (const docSnap of querySnapshot.docs) {
                        const fechamento = docSnap.data();
                        const fechamentoId = docSnap.id;
                        const totalFolhas = fechamento.folhas?.length || 0;
                        let somaTotalPesos = 0;
                        fechamento.folhas?.forEach(folha => {
                            folha.materiais?.forEach(mat => { somaTotalPesos += mat.pesoTotal; });
                        });

                        const card = document.createElement('div');
                        card.className = 'fechamento-card';
                        card.innerHTML = `
                            <div class="fechamento-header">
                                <span class="fechamento-titulo"><i class="fas fa-folder"></i> ${fechamento.nome}</span>
                                <span class="fechamento-status ${fechamento.concluido ? 'status-concluido' : 'status-aberto'}">
                                    ${fechamento.concluido ? '✓ Concluído' : '📝 Em aberto'}
                                </span>
                            </div>
                            <div><strong>Fornecedor:</strong> ${fechamento.fornecedor}</div>
                            <div><strong>Folhas:</strong> ${totalFolhas} | <strong>Peso Total:</strong> ${formatarNumero(somaTotalPesos)} kg</div>
                            <div id="folhas-${fechamentoId}" style="margin-top: 10px;"></div>
                            <div style="margin-top: 15px;">
                                <button class="btn-abrir-folha" data-id="${fechamentoId}"><i class="fas fa-plus"></i> Nova Folha</button>
                                ${!fechamento.concluido ? `<button class="btn-gerar-pdf-fechamento" data-id="${fechamentoId}"><i class="fas fa-file-pdf"></i> Gerar PDF e Concluir</button>` : `<button class="btn-ver-pdf" data-id="${fechamentoId}"><i class="fas fa-eye"></i> Ver PDF</button>`}
                                <button class="btn-editar-fechamento" data-id="${fechamentoId}"><i class="fas fa-edit"></i> Editar Nome</button>
                                <button class="btn-excluir-fechamento" data-id="${fechamentoId}"><i class="fas fa-trash"></i> Excluir</button>
                            </div>
                        `;

                        const folhasDiv = card.querySelector(`#folhas-${fechamentoId}`);
                        if (fechamento.folhas && fechamento.folhas.length > 0) {
                            fechamento.folhas.forEach((folha, idx) => {
                                const folhaDiv = document.createElement('div');
                                folhaDiv.className = 'folha-item';
                                let materiaisStr = '';
                                folha.materiais.forEach(mat => {
                                    const pesosStr = mat.pesos.map(p => formatarNumero(p)).join('+');
                                    materiaisStr += `${mat.nome}: ${pesosStr}=${formatarNumero(mat.pesoTotal)}kg `;
                                });
                                folhaDiv.innerHTML = `
                                    <small><strong>Folha ${idx + 1}</strong> - ${new Date(folha.data).toLocaleDateString('pt-BR')}</small><br>
                                    <small>Bal: ${formatarNumero(folha.pesoBalancao)}kg | ${materiaisStr}</small>
                                    <div style="margin-top: 5px;">
                                        <button class="btn-editar-folha" data-fechamento="${fechamentoId}" data-folha-id="${folha.id}" style="background:#3498db;color:white;border:none;padding:2px 8px;border-radius:4px;font-size:11px;"><i class="fas fa-edit"></i> Editar</button>
                                        <button class="btn-excluir-folha" data-fechamento="${fechamentoId}" data-folha-id="${folha.id}" style="background:#e74c3c;color:white;border:none;padding:2px 8px;border-radius:4px;font-size:11px;"><i class="fas fa-trash"></i> Excluir</button>
                                    </div>
                                `;
                                folhasDiv.appendChild(folhaDiv);
                            });
                        } else {
                            folhasDiv.innerHTML = '<small style="color:#999;">Nenhuma folha adicionada</small>';
                        }

                        listaFechamentosDiv.appendChild(card);
                    }

                    document.querySelectorAll('.btn-abrir-folha').forEach(btn => {
                        btn.addEventListener('click', () => abrirModalFolha(btn.dataset.id, null));
                    });
                    document.querySelectorAll('.btn-editar-folha').forEach(btn => {
                        btn.addEventListener('click', () => abrirModalFolha(btn.dataset.fechamento, btn.dataset.folhaId));
                    });
                    document.querySelectorAll('.btn-excluir-folha').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            if (confirm('Excluir esta folha?')) {
                                const fechamentoId = btn.dataset.fechamento;
                                const folhaId = btn.dataset.folhaId;
                                const fechamentoRef = doc(window.db, "fechamentos", fechamentoId);
                                const fechamentoSnap = await getDoc(fechamentoRef);
                                if (fechamentoSnap.exists()) {
                                    const fechamento = fechamentoSnap.data();
                                    const folhasAtuais = fechamento.folhas.filter(f => f.id !== folhaId);
                                    await updateDoc(fechamentoRef, { folhas: folhasAtuais });
                                    mostrarAlerta('Folha excluída!', 'sucesso');
                                    await carregarFechamentos();
                                }
                            }
                        });
                    });
                    document.querySelectorAll('.btn-gerar-pdf-fechamento').forEach(btn => {
                        btn.addEventListener('click', () => gerarPDFFechamento(btn.dataset.id));
                    });
                    document.querySelectorAll('.btn-ver-pdf').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const fechamentoRef = doc(window.db, "fechamentos", btn.dataset.id);
                            const fechamentoSnap = await getDoc(fechamentoRef);
                            if (fechamentoSnap.exists() && fechamentoSnap.data().pdfGerado) {
                                const link = document.createElement('a');
                                link.href = fechamentoSnap.data().pdfGerado;
                                link.download = `fechamento_${fechamentoSnap.data().nome.replace(/\s/g, '_')}.pdf`;
                                link.click();
                            } else {
                                mostrarAlerta('PDF não encontrado');
                            }
                        });
                    });
                    document.querySelectorAll('.btn-editar-fechamento').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            const novoNome = prompt('Digite o novo nome do fechamento:');
                            if (novoNome) {
                                await updateDoc(doc(window.db, "fechamentos", btn.dataset.id), { nome: novoNome });
                                await carregarFechamentos();
                                mostrarAlerta('Nome atualizado!', 'sucesso');
                            }
                        });
                    });
                    document.querySelectorAll('.btn-excluir-fechamento').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            if (confirm('⚠️ Excluir este fechamento e todas as folhas?')) {
                                await deleteDoc(doc(window.db, "fechamentos", btn.dataset.id));
                                await carregarFechamentos();
                                mostrarAlerta('Fechamento excluído!', 'sucesso');
                            }
                        });
                    });
                } catch (error) {
                    listaFechamentosDiv.innerHTML = '<p>Erro ao carregar fechamentos.</p>';
                }
            }

            function abrirModalFolha(fechamentoId, folhaId) {
                document.getElementById('fechamentoAtualId').value = fechamentoId;
                document.getElementById('modalFolhaTitulo').textContent = folhaId ? 'Editar Folha' : 'Nova Folha';
                document.getElementById('folhaData').value = new Date().toISOString().split('T')[0];
                document.getElementById('folhaPesoBalancao').value = '';
                document.getElementById('folhaEstado').value = '';
                materiaisListDiv.innerHTML = '';
                folhaEditandoId = folhaId;

                if (folhaId) {
                    carregarFolhaParaEdicao(fechamentoId, folhaId);
                } else {
                    adicionarMaterialExemplo();
                }
                document.getElementById('modalFolha').classList.add('active');
            }

            async function carregarFolhaParaEdicao(fechamentoId, folhaId) {
                const fechamentoRef = doc(window.db, "fechamentos", fechamentoId);
                const fechamentoSnap = await getDoc(fechamentoRef);
                if (fechamentoSnap.exists()) {
                    const folha = fechamentoSnap.data().folhas?.find(f => f.id === folhaId);
                    if (folha) {
                        document.getElementById('folhaData').value = folha.data;
                        document.getElementById('folhaPesoBalancao').value = folha.pesoBalancao;
                        document.getElementById('folhaEstado').value = folha.estado;
                        materiaisListDiv.innerHTML = '';
                        folha.materiais.forEach(mat => {
                            const card = criarMaterialCard(mat.nome, mat.pesos);
                            materiaisListDiv.appendChild(card);
                        });
                        calcularSomaFolha();
                    }
                }
            }

            function fecharModalFolha() {
                document.getElementById('modalFolha').classList.remove('active');
                materiaisListDiv.innerHTML = '';
                folhaEditandoId = null;
            }

            function resetModalFolha() {
                document.getElementById('folhaData').value = new Date().toISOString().split('T')[0];
                document.getElementById('folhaPesoBalancao').value = '';
                document.getElementById('folhaEstado').value = '';
                materiaisListDiv.innerHTML = '';
                adicionarMaterialExemplo();
                calcularSomaFolha();
            }

            function adicionarMaterialExemplo() {
                if (materiaisCadastrados.length > 0) {
                    const novoCard = criarMaterialCard(materiaisCadastrados[0].nome);
                    materiaisListDiv.appendChild(novoCard);
                }
            }

            document.getElementById('novoFechamentoBtn').addEventListener('click', () => {
                document.getElementById('nomeFechamento').value = '';
                document.getElementById('fechamentoFornecedor').value = '';
                document.getElementById('modalNovoFechamento').classList.add('active');
            });

            document.getElementById('criarFechamentoBtn').addEventListener('click', async () => {
                const nome = document.getElementById('nomeFechamento').value.trim();
                const fornecedor = document.getElementById('fechamentoFornecedor').value;
                if (!nome) { alert('Digite o nome do fechamento'); return; }
                if (!fornecedor) { alert('Selecione um fornecedor'); return; }
                try {
                    await addDoc(collection(window.db, "fechamentos"), {
                        nome: nome,
                        fornecedor: fornecedor,
                        folhas: [],
                        status: 'aberto',
                        concluido: false,
                        dataCriacao: new Date().toISOString()
                    });
                    mostrarAlerta('Fechamento criado com sucesso!', 'sucesso');
                    document.getElementById('modalNovoFechamento').classList.remove('active');
                    await carregarFechamentos();
                } catch (error) { alert('Erro: ' + error.message); }
            });

            document.getElementById('closeNovoFechamentoBtn').addEventListener('click', () => document.getElementById('modalNovoFechamento').classList.remove('active'));
            document.getElementById('closeFolhaModalBtn').addEventListener('click', fecharModalFolha);
            document.getElementById('cancelarFolhaBtn').addEventListener('click', fecharModalFolha);
            document.getElementById('salvarFolhaBtn').addEventListener('click', salvarFolha);
            document.getElementById('addMaterialBtn').addEventListener('click', () => { const card = criarMaterialCard(''); materiaisListDiv.appendChild(card); calcularSomaFolha(); });
            document.getElementById('openCadastroMaterialBtn').addEventListener('click', () => document.getElementById('modalCadastroMaterial').classList.add('active'));
            document.getElementById('openCadastroFornecedorBtn').addEventListener('click', () => document.getElementById('modalCadastroFornecedor').classList.add('active'));
            document.getElementById('closeCadastroModalBtn').addEventListener('click', () => document.getElementById('modalCadastroMaterial').classList.remove('active'));
            document.getElementById('closeFornecedorModalBtn').addEventListener('click', () => document.getElementById('modalCadastroFornecedor').classList.remove('active'));
            document.getElementById('salvarMaterialBtn').addEventListener('click', async () => {
                const nome = document.getElementById('novoMaterialNome').value.trim();
                if (!nome) return alert('Digite o nome');
                await addDoc(collection(window.db, "materiais"), { nome: nome });
                document.getElementById('mensagemSucesso').style.display = 'block';
                document.getElementById('mensagemSucesso').textContent = 'Material cadastrado!';
                setTimeout(() => document.getElementById('mensagemSucesso').style.display = 'none', 3000);
                document.getElementById('novoMaterialNome').value = '';
                await carregarMateriais();
                mostrarAlerta('Material cadastrado!', 'sucesso');
            });
            document.getElementById('salvarFornecedorBtn').addEventListener('click', async () => {
                const nome = document.getElementById('novoFornecedorNome').value.trim();
                if (!nome) return alert('Digite o nome');
                await addDoc(collection(window.db, "fornecedores"), { nome: nome });
                document.getElementById('mensagemSucessoFornecedor').style.display = 'block';
                document.getElementById('mensagemSucessoFornecedor').textContent = 'Fornecedor cadastrado!';
                setTimeout(() => document.getElementById('mensagemSucessoFornecedor').style.display = 'none', 3000);
                document.getElementById('novoFornecedorNome').value = '';
                await carregarFornecedores();
                mostrarAlerta('Fornecedor cadastrado!', 'sucesso');
            });

            async function init() {
                await carregarMateriais();
                await carregarFornecedores();
                await carregarFechamentos();
            }
            init();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', iniciarSistema);
        } else {
            iniciarSistema();
        }
        window.addEventListener('firebaseReady', iniciarSistema);
    </script>
    
    <!-- Main JS (sidebar e topbar) -->
    <script src="/firebase-config.js"></script>
    
    <!-- Sistema de Manutenção -->
    <script src="/js/manut.js"></script>
</body>
