<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Custos | Reciclagem Mil Plásticos</title>

    <!-- CSS existentes -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/sidebar.css">
    <link rel="stylesheet" href="/assets/css/topbar.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- Bibliotecas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --primary: #0d904f;
            --primary-dark: #0b7a43;
            --success: #1a8a4a;
            --danger: #c62828;
            --warning: #f57c00;
            --info: #0277bd;
            --purple: #6a1b9a;
            --bg: #f5f7fa;
            --card: #ffffff;
            --border: #e0e4e9;
            --text: #1a1a1a;
            --text-light: #6b7280;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --radius: 10px;
        }

        * { box-sizing: border-box; }

        .custos-container {
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header-custos {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-custos h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0;
        }

        .header-custos h1 i {
            color: var(--primary);
            font-size: 1.8rem;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title i {
            color: var(--primary);
        }

        /* Botões */
        .btn {
            padding: 0.55rem 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { filter: brightness(1.1); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-info { background: var(--info); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-purple { background: var(--purple); color: #fff; }
        .btn-outline { background: #fff; border: 1.5px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.78rem; }
        .btn-xs { padding: 0.25rem 0.55rem; font-size: 0.7rem; border-radius: 6px; }

        /* Grid de Estatísticas */
        .stats-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.25rem;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            transition: all 0.2s;
            position: relative;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .stat-card.minimized .stat-value,
        .stat-card.minimized .stat-label { display: none; }
        .stat-card.minimized { padding: 0.75rem 1rem; }
        .stat-card.minimized .stat-icon { font-size: 1.2rem; }

        .stat-icon {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.25rem;
        }

        .stat-toggle {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            font-size: 0.9rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .stat-toggle:hover { opacity: 1; }

        /* Máquinas */
        .maquinas-grid {
            display: grid;
            gap: 1.25rem;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .maquina-card {
            background: linear-gradient(135deg, #0d904f 0%, #0b7a43 100%);
            color: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .maquina-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(13, 144, 79, 0.3);
        }

        .maquina-card .nome {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .maquina-card .desc {
            font-size: 0.82rem;
            opacity: 0.9;
            margin-bottom: 0.75rem;
        }

        .maquina-card .info {
            font-size: 0.78rem;
            opacity: 0.85;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .maquina-card .acoes {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            display: flex;
            gap: 0.4rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .maquina-card:hover .acoes { opacity: 1; }
        .maquina-card .acoes .btn { font-size: 0.7rem; padding: 0.25rem 0.5rem; }

        /* Resumo Agregado */
        .resumo-agregado {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }

        .resumo-agregado h3 {
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #4fc3f7;
        }

        .resumo-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .resumo-item {
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .resumo-item .valor {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4fc3f7;
        }

        .resumo-item .rotulo {
            font-size: 0.72rem;
            opacity: 0.7;
            margin-top: 0.25rem;
        }

        /* Tabela */
        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        th {
            background: #f9fafb;
            padding: 0.85rem 0.75rem;
            text-align: left;
            font-weight: 600;
            color: var(--text);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 0.7rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover { background: #f8fafc; }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            padding: 0.35rem 0.75rem;
            background: var(--card);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.82rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
            color: var(--text-light);
        }

        .breadcrumb-item.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .breadcrumb-item:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .breadcrumb-sep {
            color: var(--text-light);
            font-size: 0.7rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #fff;
            border-radius: 14px;
            padding: 1.75rem;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal h2 {
            margin: 0 0 1.25rem 0;
            font-size: 1.25rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.3rem;
            font-size: 0.82rem;
            color: var(--text);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 144, 79, 0.1);
        }

        .grid-2 {
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 1200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.active { display: flex; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e0e0e0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Firestore status */
        .firebase-status {
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-firebase { background: #e8f5e9; color: #2e7d32; }
        .status-local { background: #fff3e0; color: #e65100; }

        /* Config campos */
        .campo-config-item {
            background: #f9fafb;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .campo-config-item .nome-original {
            font-size: 0.78rem;
            color: var(--text-light);
        }

        /* Tooltip */
        .tooltip-icon {
            cursor: help;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .money { font-family: 'SF Mono', 'Cascadia Code', monospace; font-weight: 600; }

        /* Badges */
        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .badge-green { background: #e8f5e9; color: #2e7d32; }
        .badge-blue { background: #e3f2fd; color: #1565c0; }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; color: var(--text);">Carregando Central de Custos...</p>
    </div>

    <div class="custos-container">
        <!-- Header -->
        <div class="header-custos">
            <h1><i class="fas fa-recycle"></i> Central de Custos <span style="font-size: 0.7rem; font-weight: 400; color: var(--text-light);">Mil Plásticos</span></h1>
            <div style="display: flex; gap: 0.75rem; align-items: center;">
                <button class="btn btn-outline btn-sm" onclick="window.abrirConfigCampos()" title="Personalizar nomes dos campos">
                    <i class="fas fa-sliders-h"></i> Personalizar Campos
                </button>
                <span id="firebaseStatus" class="firebase-status status-local">
                    <span class="status-dot"></span> Conectando...
                </span>
            </div>
        </div>

        <!-- Breadcrumb -->
        <div class="breadcrumb" id="breadcrumb"></div>

        <!-- Conteúdo Dinâmico -->
        <div id="conteudoDinamico"></div>
    </div>

    <!-- MODAIS -->
    <!-- Modal Máquina/Setor -->
    <div class="modal-overlay" id="modalMaquina">
        <div class="modal">
            <h2 id="modalMaquinaTitulo"><i class="fas fa-industry"></i> Novo Setor</h2>
            <input type="hidden" id="maquinaEditId">
            <div class="form-group">
                <label id="labelMaquinaNome">Nome do Setor</label>
                <input type="text" id="maquinaNome" placeholder="Ex: Extrusora 01, Moagem, Lavagem">
            </div>
            <div class="form-group">
                <label id="labelMaquinaDesc">Descrição</label>
                <input type="text" id="maquinaDescricao" placeholder="Ex: Linha de reciclagem de PEAD">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label id="labelMaquinaMes">Mês de Referência</label>
                    <select id="maquinaMes">
                        <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                        <option value="3">Março</option><option value="4">Abril</option>
                        <option value="5">Maio</option><option value="6">Junho</option>
                        <option value="7">Julho</option><option value="8">Agosto</option>
                        <option value="9">Setembro</option><option value="10">Outubro</option>
                        <option value="11">Novembro</option><option value="12">Dezembro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label id="labelMaquinaAno">Ano de Referência</label>
                    <input type="number" id="maquinaAno" value="2026" min="2020" max="2030">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-info-circle"></i> Este mês/ano representa o estágio/fase deste setor na empresa</label>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="window.fecharModal('modalMaquina')">Cancelar</button>
                <button class="btn btn-primary" onclick="window.salvarMaquina()">
                    <i class="fas fa-save"></i> Salvar Setor
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Período -->
    <div class="modal-overlay" id="modalPeriodo">
        <div class="modal">
            <h2>Novo Período de Análise</h2>
            <input type="hidden" id="periodoEditId">
            <div class="grid-2">
                <div class="form-group">
                    <label>Mês</label>
                    <select id="periodoMes">
                        <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                        <option value="3">Março</option><option value="4">Abril</option>
                        <option value="5">Maio</option><option value="6">Junho</option>
                        <option value="7">Julho</option><option value="8">Agosto</option>
                        <option value="9">Setembro</option><option value="10">Outubro</option>
                        <option value="11">Novembro</option><option value="12">Dezembro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ano</label>
                    <input type="number" id="periodoAno" value="2026">
                </div>
            </div>
            <div class="form-group">
                <label>Observação</label>
                <input type="text" id="periodoObs" placeholder="Ex: Fechamento mensal, auditoria...">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="window.fecharModal('modalPeriodo')">Cancelar</button>
                <button class="btn btn-primary" onclick="window.salvarPeriodo()">Criar Período</button>
            </div>
        </div>
    </div>

    <!-- Modal Categoria -->
    <div class="modal-overlay" id="modalCategoria">
        <div class="modal">
            <h2 id="modalCategoriaTitulo">Nova Categoria de Custo</h2>
            <input type="hidden" id="categoriaEditId">
            <div class="form-group">
                <label>Nome da Categoria</label>
                <input type="text" id="categoriaNome" placeholder="Ex: Energia Elétrica, Matéria-Prima">
            </div>
            <div class="form-group">
                <label>Cor para Gráficos</label>
                <input type="color" id="categoriaCor" value="#0d904f">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="window.fecharModal('modalCategoria')">Cancelar</button>
                <button class="btn btn-primary" onclick="window.salvarCategoria()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal Item de Custo -->
    <div class="modal-overlay" id="modalItemCusto">
        <div class="modal">
            <h2 id="modalItemTitulo">Novo Item de Custo</h2>
            <input type="hidden" id="itemEditId">
            <div class="grid-2">
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="itemCategoria"></select>
                </div>
                <div class="form-group">
                    <label>Item</label>
                    <input type="text" id="itemNome" placeholder="Ex: Conta CEMIG">
                </div>
                <div class="form-group">
                    <label>Valor Total (R$)</label>
                    <input type="number" id="itemValorTotal" step="0.01" placeholder="0,00">
                </div>
                <div class="form-group">
                    <label>% Rateio</label>
                    <input type="number" id="itemPercentual" step="0.01" placeholder="100" value="100">
                </div>
            </div>
            <div class="form-group">
                <label>Observação</label>
                <input type="text" id="itemObs" placeholder="Observação opcional">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="window.fecharModal('modalItemCusto')">Cancelar</button>
                <button class="btn btn-primary" onclick="window.salvarItemCusto()">Salvar Item</button>
            </div>
        </div>
    </div>

    <!-- Modal Produção -->
    <div class="modal-overlay" id="modalProducao">
        <div class="modal">
            <h2>Registrar Produção</h2>
            <div class="form-group">
                <label>Material / Produto</label>
                <input type="text" id="producaoProduto" placeholder="Ex: PEAD Moído, Flake PET">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Quantidade (KG)</label>
                    <input type="number" id="producaoKg" step="0.01" placeholder="0,00">
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="producaoData">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="window.fecharModal('modalProducao')">Cancelar</button>
                <button class="btn btn-primary" onclick="window.salvarProducao()">Registrar</button>
            </div>
        </div>
    </div>

    <!-- Modal Configuração de Campos -->
    <div class="modal-overlay" id="modalConfigCampos">
        <div class="modal">
            <h2><i class="fas fa-sliders-h"></i> Personalizar Nomes dos Campos</h2>
            <p style="font-size: 0.82rem; color: var(--text-light); margin-bottom: 1rem;">
                Altere os nomes dos campos conforme a terminologia da sua empresa.
            </p>
            <div id="listaConfigCampos"></div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="window.fecharModal('modalConfigCampos')">Cancelar</button>
                <button class="btn btn-primary" onclick="window.salvarConfigCampos()">
                    <i class="fas fa-save"></i> Salvar Alterações
                </button>
            </div>
        </div>
    </div>

    <div id="reportContainer" style="position: fixed; left: -9999px; top: 0; width: 800px; background: white; padding: 30px;"></div>

    <script>
        (function() {
            // ==================== CONFIG FIREBASE ====================
            const firebaseConfig = {
                apiKey: "AIzaSyD4GQv7odzKtxg36f_SSWLbQF-TmYi4xYI",
                authDomain: "system-mil.firebaseapp.com",
                projectId: "system-mil",
                storageBucket: "system-mil.firebasestorage.app",
                messagingSenderId: "138426359863",
                appId: "1:138426359863:web:ab731a7ae1b7e03f7a1fb2"
            };

            let db = null, usandoFirebase = false;
            let maquinas = [], categorias = [], itensCusto = [], producoes = [];
            let maquinaAtual = null, periodoAtual = null;
            let pieChart = null, barChart = null;
            let nivelAtual = 'maquinas';

            // Configuração personalizada de nomes de campos
            let configCampos = {
                maquinaNome: 'Nome do Setor',
                maquinaDesc: 'Descrição',
                maquinaMes: 'Mês de Referência',
                maquinaAno: 'Ano de Referência',
                custoTotal: 'Custo Total',
                producaoKg: 'Produção (KG)',
                custoPorKg: 'Custo por KG'
            };

            const STORAGE_KEY = 'centralCustos_v3_milplasticos';
            const CONFIG_KEY = 'centralCustos_config_v3';

            // ==================== CARREGAR DADOS ====================
            function loadLocalData() {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    maquinas = parsed.maquinas || [];
                    categorias = parsed.categorias || [];
                    itensCusto = parsed.itensCusto || [];
                    producoes = parsed.producoes || [];
                } else {
                    categorias = [
                        { id: 'cat1', nome: 'Energia Elétrica', cor: '#f57c00' },
                        { id: 'cat2', nome: 'Matéria-Prima', cor: '#0d904f' },
                        { id: 'cat3', nome: 'Mão de Obra', cor: '#0277bd' },
                        { id: 'cat4', nome: 'Manutenção', cor: '#6a1b9a' }
                    ];
                    maquinas = [];
                    itensCusto = [];
                    producoes = [];
                }
                // Carregar config campos
                const savedConfig = localStorage.getItem(CONFIG_KEY);
                if (savedConfig) {
                    configCampos = { ...configCampos, ...JSON.parse(savedConfig) };
                }
            }

            function saveLocalData() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ maquinas, categorias, itensCusto, producoes }));
            }

            function saveConfig() {
                localStorage.setItem(CONFIG_KEY, JSON.stringify(configCampos));
            }

            loadLocalData();

            // ==================== FIREBASE ====================
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                usandoFirebase = true;
                document.getElementById('firebaseStatus').innerHTML = '<span class="status-dot"></span> 🔥 Firebase Online';
                document.getElementById('firebaseStatus').className = 'firebase-status status-firebase';
                carregarDadosFirebase();
            } catch (e) {
                document.getElementById('firebaseStatus').innerHTML = '<span class="status-dot"></span> 💾 Modo Local';
                document.getElementById('firebaseStatus').className = 'firebase-status status-local';
                renderizarTela();
            }

            async function carregarDadosFirebase() {
                if (!usandoFirebase || !db) return;
                try {
                    const [snapMaq, snapCat, snapItens, snapProd] = await Promise.all([
                        db.collection('custos_maquinas').get(),
                        db.collection('custos_categorias').get(),
                        db.collection('custos_itens').get(),
                        db.collection('custos_producoes').get()
                    ]);
                    maquinas = snapMaq.docs.map(d => ({ id: d.id, ...d.data() }));
                    categorias = snapCat.docs.map(d => ({ id: d.id, ...d.data() }));
                    itensCusto = snapItens.docs.map(d => ({ id: d.id, ...d.data() }));
                    producoes = snapProd.docs.map(d => ({ id: d.id, ...d.data() }));
                    saveLocalData();
                    renderizarTela();
                    document.getElementById('loadingOverlay').classList.remove('active');
                } catch (e) { console.error('Firebase:', e); renderizarTela(); }
            }

            async function salvarNoFirebase(colecao, dados) {
                if (!usandoFirebase || !db) return;
                try {
                    if (dados.id) await db.collection(colecao).doc(dados.id).set(dados);
                    else { const ref = await db.collection(colecao).add(dados); dados.id = ref.id; }
                } catch (e) { console.error('Salvar Firebase:', e); }
            }

            async function excluirDoFirebase(colecao, id) {
                if (!usandoFirebase || !db || !id) return;
                try { await db.collection(colecao).doc(id).delete(); } catch (e) { console.error(e); }
            }

            // ==================== UTILITÁRIOS ====================
            function formatMoney(valor) { return 'R$ ' + valor.toFixed(2).replace('.', ','); }
            function formatNumber(num, dec = 2) { return num.toFixed(dec).replace('.', ','); }
            function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
            function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }

            function getNomeMes(mes) {
                const nomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                    'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
                return nomes[mes - 1] || '';
            }

            // ==================== CÁLCULOS ====================
            function calcularCustosSetor(maquinaId, mes, ano) {
                const itens = itensCusto.filter(i => 
                    i.maquinaId === maquinaId && i.periodoMes === mes && i.periodoAno === ano
                );
                const totalCusto = itens.reduce((sum, i) => sum + (i.valorTotal * i.percentual / 100), 0);
                const prods = producoes.filter(p => 
                    p.maquinaId === maquinaId && p.periodoMes === mes && p.periodoAno === ano
                );
                const totalKg = prods.reduce((sum, p) => sum + p.kg, 0);
                const custoPorKg = totalKg > 0 ? totalCusto / totalKg : 0;
                return { totalCusto, totalKg, custoPorKg, qtdItens: itens.length };
            }

            // NOVO: Cálculo agregado de todos os setores
            function calcularAgregadoGeral() {
                const setoresResumo = [];
                let custoTotalGeral = 0, kgTotalGeral = 0;

                maquinas.forEach(maq => {
                    const { totalCusto, totalKg, custoPorKg } = calcularCustosSetor(maq.id, maq.mesRef, maq.anoRef);
                    custoTotalGeral += totalCusto;
                    kgTotalGeral += totalKg;
                    setoresResumo.push({
                        maquina: maq,
                        totalCusto,
                        totalKg,
                        custoPorKg
                    });
                });

                const custoPorKgGeral = kgTotalGeral > 0 ? custoTotalGeral / kgTotalGeral : 0;

                return {
                    setores: setoresResumo,
                    custoTotalGeral,
                    kgTotalGeral,
                    custoPorKgGeral,
                    qtdSetores: maquinas.length
                };
            }

            function getPeriodosDaMaquina(maq) {
                if (!maq) return [];
                const periodosMap = new Map();
                itensCusto.filter(i => i.maquinaId === maq.id).forEach(item => {
                    const key = `${item.periodoMes}_${item.periodoAno}`;
                    if (!periodosMap.has(key)) {
                        periodosMap.set(key, { mes: item.periodoMes, ano: item.periodoAno, obs: item.periodoObs || '' });
                    }
                });
                producoes.filter(p => p.maquinaId === maq.id).forEach(prod => {
                    const key = `${prod.periodoMes}_${prod.periodoAno}`;
                    if (!periodosMap.has(key)) {
                        periodosMap.set(key, { mes: prod.periodoMes, ano: prod.periodoAno, obs: '' });
                    }
                });
                return Array.from(periodosMap.values()).sort((a,b) => b.ano !== a.ano ? b.ano - a.ano : b.mes - a.mes);
            }

            function calcularCustosPeriodo() {
                if (!maquinaAtual || !periodoAtual) return { totalCusto: 0, itensCalculados: [], totalKg: 0, porCategoria: {} };
                const itensDoPeriodo = itensCusto.filter(i =>
                    i.maquinaId === maquinaAtual.id && i.periodoMes === periodoAtual.mes && i.periodoAno === periodoAtual.ano
                );
                let totalCusto = 0;
                const itensCalculados = [];
                const porCategoria = {};
                itensDoPeriodo.forEach(item => {
                    const valorAplicado = (item.valorTotal * (item.percentual / 100));
                    const categoria = categorias.find(c => c.id === item.categoriaId);
                    itensCalculados.push({ ...item, valorAplicado, categoria });
                    totalCusto += valorAplicado;
                    if (categoria) {
                        if (!porCategoria[categoria.id]) {
                            porCategoria[categoria.id] = { nome: categoria.nome, cor: categoria.cor, total: 0, itens: [] };
                        }
                        porCategoria[categoria.id].total += valorAplicado;
                        porCategoria[categoria.id].itens.push(item);
                    }
                });
                const producoesDoPeriodo = producoes.filter(p =>
                    p.maquinaId === maquinaAtual.id && p.periodoMes === periodoAtual.mes && p.periodoAno === periodoAtual.ano
                );
                const totalKg = producoesDoPeriodo.reduce((sum, p) => sum + p.kg, 0);
                return { totalCusto, itensCalculados, totalKg, porCategoria };
            }

            // ==================== GRÁFICOS ====================
            function atualizarGraficos() {
                const { porCategoria } = calcularCustosPeriodo();
                const cats = Object.values(porCategoria);
                const labels = cats.map(c => c.nome);
                const valores = cats.map(c => c.total);
                const cores = cats.map(c => c.cor || '#0d904f');

                const pieCtx = document.getElementById('pieChart');
                const barCtx = document.getElementById('barChart');
                if (!pieCtx || !barCtx) return;

                if (pieChart) pieChart.destroy();
                if (barChart) barChart.destroy();

                pieChart = new Chart(pieCtx, {
                    type: 'doughnut',
                    data: { labels, datasets: [{ data: valores, backgroundColor: cores, borderWidth: 2, borderColor: '#fff' }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, padding: 15 } } } }
                });

                barChart = new Chart(barCtx, {
                    type: 'bar',
                    data: { labels, datasets: [{ label: 'Valor (R$)', data: valores, backgroundColor: cores, borderRadius: 6, borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => 'R$ ' + v } } } }
                });
            }

            // ==================== RENDERIZAÇÃO ====================
            function renderizarTela() {
                if (nivelAtual === 'maquinas') renderizarMaquinas();
                else if (nivelAtual === 'periodos') renderizarPeriodos();
                else if (nivelAtual === 'custos') renderizarCustos();
                atualizarBreadcrumb();
            }

            function renderizarMaquinas() {

                const container = document.getElementById('conteudoDinamico');

                container.innerHTML = `

                    <div class="resumo-agregado">

                                <div class="rotulo">${configCampos.custoPorKg}</div>
                            </div>
                        </div>
                        ${agregado.setores.length > 0 ? `
                        <div style="margin-top: 1rem;">
                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Setor</th>
                                            <th>Mês/Ano Ref.</th>
                                            <th>${configCampos.custoTotal}</th>
                                            <th>${configCampos.producaoKg}</th>
                                            <th>${configCampos.custoPorKg}</th>
                                            <th>Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${agregado.setores.map(s => `
                                            <tr>
                                                <td><strong>${s.maquina.nome}</strong></td>
                                                <td>${getNomeMes(s.maquina.mesRef)}/${s.maquina.anoRef}</td>
                                                <td class="money">${formatMoney(s.totalCusto)}</td>
                                                <td>${formatNumber(s.totalKg, 0)} kg</td>
                                                <td class="money">${formatMoney(s.custoPorKg)}/kg</td>
                                                <td>
                                                    <button class="btn btn-outline btn-xs" onclick="window.selecionarMaquina('${s.maquina.id}')"><i class="fas fa-eye"></i> Analisar</button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                    ` : `
                    <div class="card" style="text-align: center; padding: 2rem;">
                        <i class="fas fa-recycle" style="font-size: 3rem; color: var(--border); margin-bottom: 1rem;"></i>
                        <p style="color: var(--text-light);">Nenhum setor cadastrado. Adicione setores para visualizar o fechamento geral.</p>
                    </div>
                    `}

                    <!-- LISTA DE SETORES -->
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title"><i class="fas fa-industry"></i> Setores da Reciclagem</span>
                            <button class="btn btn-primary btn-sm" onclick="window.abrirModalMaquina()">
                                <i class="fas fa-plus"></i> Novo Setor
                            </button>
                        </div>
                        <div class="maquinas-grid" id="maquinasGrid">
                            ${maquinas.length === 0 && !document.getElementById('maquinasGrid')?.children.length ?
                                '<p style="grid-column: 1/-1; text-align: center; color: var(--text-light);">Clique em "Novo Setor" para cadastrar.</p>' : ''}
                        </div>
                    </div>
                `;

                // Preencher grid de máquinas
                const grid = document.getElementById('maquinasGrid');
                if (grid) {
                    maquinas.forEach(maq => {
                        const { totalCusto, totalKg, custoPorKg } = calcularCustosSetor(maq.id, maq.mesRef, maq.anoRef);
                        const div = document.createElement('div');
                        div.className = 'maquina-card';
                        div.onclick = () => window.selecionarMaquina(maq.id);
                        div.innerHTML = `
                            <div class="acoes">
                                <button class="btn btn-sm" style="background: rgba(255,255,255,0.2); color: #fff;" onclick="event.stopPropagation(); window.editarMaquina('${maq.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm" style="background: rgba(255,255,255,0.2); color: #fff;" onclick="event.stopPropagation(); window.excluirMaquina('${maq.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                            <div class="nome"><i class="fas fa-cog"></i> ${maq.nome}</div>
                            <div class="desc">${maq.descricao || 'Sem descrição'}</div>
                            <div class="info">
                                <span><i class="fas fa-calendar"></i> ${getNomeMes(maq.mesRef)}/${maq.anoRef}</span>
                                <span><i class="fas fa-dollar-sign"></i> ${formatMoney(totalCusto)}</span>
                                <span><i class="fas fa-weight"></i> ${formatNumber(totalKg, 0)} kg</span>
                                <span>${formatMoney(custoPorKg)}/kg</span>
                            </div>
                        `;
                        grid.appendChild(div);
                    });
                }
            }

            // ==================== PERÍODOS ====================
            function renderizarPeriodos() {
                if (!maquinaAtual) { navegarPara('maquinas'); return; }
                const periodos = getPeriodosDaMaquina(maquinaAtual);
                const container = document.getElementById('conteudoDinamico');

                container.innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title"><i class="fas fa-calendar-alt"></i> Períodos - ${maquinaAtual.nome}</span>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn btn-primary btn-sm" onclick="window.abrirModalPeriodo()"><i class="fas fa-plus"></i> Novo Período</button>

                        </div>

                const grid = document.getElementById('periodosGrid');

                    const div = document.createElement('div');
                    div.className = 'stat-card';
                    div.style.cursor = 'pointer';
                    div.onclick = () => window.selecionarPeriodo(per.mes, per.ano);
                    div.innerHTML = `
                        <div style="font-weight: 600; margin-bottom: 0.5rem;"><i class="fas fa-calendar"></i> ${getNomeMes(per.mes)}/${per.ano}</div>
                        <div style="font-size: 0.78rem; color: var(--text-light);">${per.obs || 'Sem observações'}</div>
                        <div style="margin-top: 0.75rem; font-size: 0.85rem;">
                            <div>Custo: <strong>${formatMoney(totalCusto)}</strong></div>
                            <div>Produção: <strong>${formatNumber(totalKg, 0)} kg</strong></div>
                        </div>

                    grid.appendChild(div);
                });
            }

            let cardsMinimizados = { custoTotal: false, producaoKg: false, custoPorKg: false };

                const nomeMes = getNomeMes(periodoAtual.mes);

                const container = document.getElementById('conteudoDinamico');

                    <!-- Gráficos -->

                    <!-- Categorias e Itens -->

            // Toggle minimizar cards
            window.toggleStatCard = function(tipo) {
                cardsMinimizados[tipo] = !cardsMinimizados[tipo];
                const card = document.getElementById('stat' + tipo.charAt(0).toUpperCase() + tipo.slice(1));
                if (card) card.classList.toggle('minimized');
            };

            function carregarCategoriasLista() {
                const el = document.getElementById('categoriasList');
                if (!el) return;
                el.innerHTML = categorias.length === 0 ? '<p style="text-align:center;color:var(--text-light);">Nenhuma categoria</p>' :
                    categorias.map(c => `
                        <div class="campo-config-item" style="border-left: 4px solid ${c.cor};">
                            <span><i class="fas fa-circle" style="color:${c.cor};font-size:0.6rem;"></i> ${c.nome}</span>
                            <div>
                                <button class="btn btn-outline btn-xs" onclick="window.editarCategoria('${c.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-danger btn-xs" onclick="window.excluirCategoria('${c.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');
            }

            function carregarItensCustoLista() {
                const el = document.getElementById('itensCustoList');
                if (!el || !maquinaAtual || !periodoAtual) return;
                const itens = itensCusto.filter(i => i.maquinaId === maquinaAtual.id && i.periodoMes === periodoAtual.mes && i.periodoAno === periodoAtual.ano);
                el.innerHTML = itens.length === 0 ? '<p style="text-align:center;color:var(--text-light);">Nenhum item</p>' :
                    itens.map(item => {
                        const cat = categorias.find(c => c.id === item.categoriaId);
                        return `<div class="campo-config-item">
                            <div><strong>${item.nome}</strong><br><small>${cat?.nome || 'Sem cat.'}</small></div>
                            <div style="text-align:right;">
                                <div class="money">${formatMoney(item.valorTotal)}</div>
                                <span class="badge badge-blue">${item.percentual}%</span>
                            </div>
                            <div>
                                <button class="btn btn-outline btn-xs" onclick="window.editarItemCusto('${item.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-danger btn-xs" onclick="window.excluirItemCusto('${item.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                    }).join('');
            }

            function carregarTabelaCustos() {
                const tbody = document.getElementById('tabelaCustos');
                if (!tbody) return;
                const { itensCalculados } = calcularCustosPeriodo();
                if (itensCalculados.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Nenhum item</td></tr>'; return; }

                const grupos = {};
                itensCalculados.forEach(item => {
                    const cid = item.categoriaId;
                    if (!grupos[cid]) grupos[cid] = { cat: item.categoria, itens: [], subtotal: 0 };
                    grupos[cid].itens.push(item);
                    grupos[cid].subtotal += item.valorAplicado;
                });

                tbody.innerHTML = Object.values(grupos).map(g => `
                    <tr style="background:#f0faf4; font-weight:600;">
                        <td colspan="6"><i class="fas fa-folder"></i> ${g.cat?.nome || 'Sem categoria'} — Subtotal: ${formatMoney(g.subtotal)}</td>
                    </tr>
                    ${g.itens.map(item => `
                        <tr>
                            <td></td>
                            <td>${item.nome} ${item.obs ? `<small>(${item.obs})</small>` : ''}</td>
                            <td class="money">${formatMoney(item.valorTotal)}</td>
                            <td>${item.percentual}%</td>
                            <td class="money"><strong>${formatMoney(item.valorAplicado)}</strong></td>
                            <td>
                                <button class="btn btn-outline btn-xs" onclick="window.editarItemCusto('${item.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-danger btn-xs" onclick="window.excluirItemCusto('${item.id}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('')}
                `).join('');
            }

            function carregarProducoesLista() {
                const el = document.getElementById('producaoList');
                if (!el || !maquinaAtual || !periodoAtual) return;
                const prods = producoes.filter(p => p.maquinaId === maquinaAtual.id && p.periodoMes === periodoAtual.mes && p.periodoAno === periodoAtual.ano);
                el.innerHTML = prods.length === 0 ? '<p style="text-align:center;color:var(--text-light);">Nenhuma produção</p>' : `
                    <div class="table-wrap"><table>
                        <thead><tr><th>Data</th><th>Material</th><th>KG</th><th>Ações</th></tr></thead>
                        <tbody>${prods.map(p => `
                            <tr>
                                <td>${new Date(p.data + 'T00:00:00').toLocaleDateString('pt-BR')}</td>
                                <td>${p.produto}</td>
                                <td>${formatNumber(p.kg, 0)} kg</td>
                                <td><button class="btn btn-danger btn-xs" onclick="window.excluirProducao('${p.id}')"><i class="fas fa-trash"></i></button></td>
                            </tr>
                        `).join('')}</tbody>
                    </table></div>`;
            }

            function atualizarBreadcrumb() {
                const bc = document.getElementById('breadcrumb');
                let html = `<span class="breadcrumb-item ${nivelAtual === 'maquinas' ? 'active' : ''}" onclick="window.navegarPara('maquinas')"><i class="fas fa-industry"></i> Setores</span>`;
                if (maquinaAtual && nivelAtual !== 'maquinas') {
                    html += `<span class="breadcrumb-sep"><i class="fas fa-chevron-right"></i></span>`;
                    html += `<span class="breadcrumb-item ${nivelAtual === 'periodos' ? 'active' : ''}" onclick="window.navegarPara('periodos')">${maquinaAtual.nome}</span>`;
                }
                if (periodoAtual && nivelAtual === 'custos') {
                    html += `<span class="breadcrumb-sep"><i class="fas fa-chevron-right"></i></span>`;
                    html += `<span class="breadcrumb-item active">${getNomeMes(periodoAtual.mes)}/${periodoAtual.ano}</span>`;
                }
                bc.innerHTML = html;
            }

            // ==================== NAVEGAÇÃO ====================
            window.navegarPara = function(nivel) {
                if (nivel === 'maquinas') { maquinaAtual = null; periodoAtual = null; nivelAtual = 'maquinas'; }
                else if (nivel === 'periodos') { periodoAtual = null; nivelAtual = 'periodos'; }
                renderizarTela();
            };

            window.selecionarMaquina = function(id) {
                maquinaAtual = maquinas.find(m => m.id === id);
                periodoAtual = null;
                nivelAtual = 'periodos';
                renderizarTela();
            };

            window.selecionarPeriodo = function(mes, ano) {
                periodoAtual = { mes, ano };
                nivelAtual = 'custos';
                renderizarTela();
            };

            // ==================== CRUD MÁQUINAS ====================
            window.abrirModalMaquina = function(id = null) {
                // Atualizar labels com nomes personalizados
                document.getElementById('labelMaquinaNome').innerText = configCampos.maquinaNome;
                document.getElementById('labelMaquinaDesc').innerText = configCampos.maquinaDesc;
                document.getElementById('labelMaquinaMes').innerText = configCampos.maquinaMes;
                document.getElementById('labelMaquinaAno').innerText = configCampos.maquinaAno;

                document.getElementById('modalMaquina').classList.add('active');
                const titulo = document.getElementById('modalMaquinaTitulo');
                if (id) {
                    const m = maquinas.find(x => x.id === id);
                    if (m) {
                        titulo.innerHTML = '<i class="fas fa-edit"></i> Editar Setor';
                        document.getElementById('maquinaEditId').value = m.id;
                        document.getElementById('maquinaNome').value = m.nome;
                        document.getElementById('maquinaDescricao').value = m.descricao || '';
                        document.getElementById('maquinaMes').value = m.mesRef || 1;
                        document.getElementById('maquinaAno').value = m.anoRef || 2026;
                    }
                } else {
                    titulo.innerHTML = '<i class="fas fa-plus"></i> Novo Setor';
                    document.getElementById('maquinaEditId').value = '';
                    document.getElementById('maquinaNome').value = '';
                    document.getElementById('maquinaDescricao').value = '';
                    document.getElementById('maquinaMes').value = new Date().getMonth() + 1;
                    document.getElementById('maquinaAno').value = new Date().getFullYear();
                }
            };

            window.salvarMaquina = async function() {
                const m = {
                    nome: document.getElementById('maquinaNome').value.trim(),
                    descricao: document.getElementById('maquinaDescricao').value.trim(),
                    mesRef: parseInt(document.getElementById('maquinaMes').value),
                    anoRef: parseInt(document.getElementById('maquinaAno').value),
                    createdAt: new Date().toISOString()
                };
                if (!m.nome) { alert('Digite o nome do setor!'); return; }
                const editId = document.getElementById('maquinaEditId').value;
                if (editId) { m.id = editId; const idx = maquinas.findIndex(x => x.id === editId); if (idx !== -1) maquinas[idx] = m; }
                else { m.id = 'maq_' + Date.now(); maquinas.push(m); }
                await salvarNoFirebase('custos_maquinas', m);
                saveLocalData();
                window.fecharModal('modalMaquina');
                renderizarTela();
            };

            window.editarMaquina = (id) => window.abrirModalMaquina(id);

            window.excluirMaquina = async function(id) {
                if (confirm('Excluir este setor e todos os dados vinculados?')) {
                    itensCusto = itensCusto.filter(i => i.maquinaId !== id);
                    producoes = producoes.filter(p => p.maquinaId !== id);
                    maquinas = maquinas.filter(m => m.id !== id);
                    await excluirDoFirebase('custos_maquinas', id);
                    saveLocalData();
                    if (maquinaAtual?.id === id) { maquinaAtual = null; nivelAtual = 'maquinas'; }
                    renderizarTela();
                }
            };

            // ==================== CRUD PERÍODOS ====================
            window.abrirModalPeriodo = function() {
                document.getElementById('modalPeriodo').classList.add('active');
                document.getElementById('periodoMes').value = new Date().getMonth() + 1;
                document.getElementById('periodoAno').value = new Date().getFullYear();
                document.getElementById('periodoObs').value = '';
            };

            window.salvarPeriodo = function() {
                if (!maquinaAtual) return;
                const mes = parseInt(document.getElementById('periodoMes').value);
                const ano = parseInt(document.getElementById('periodoAno').value);
                window.fecharModal('modalPeriodo');
                window.selecionarPeriodo(mes, ano);
            };

            // ==================== CRUD CATEGORIAS ====================
            window.abrirModalCategoria = function(id = null) {
                document.getElementById('modalCategoria').classList.add('active');
                if (id) {
                    const c = categorias.find(x => x.id === id);
                    if (c) {
                        document.getElementById('modalCategoriaTitulo').innerText = 'Editar Categoria';
                        document.getElementById('categoriaEditId').value = c.id;
                        document.getElementById('categoriaNome').value = c.nome;
                        document.getElementById('categoriaCor').value = c.cor;
                    }
                } else {
                    document.getElementById('modalCategoriaTitulo').innerText = 'Nova Categoria';
                    document.getElementById('categoriaEditId').value = '';
                    document.getElementById('categoriaNome').value = '';
                    document.getElementById('categoriaCor').value = '#0d904f';
                }
            };

            window.salvarCategoria = async function() {
                const c = {
                    nome: document.getElementById('categoriaNome').value.trim(),
                    cor: document.getElementById('categoriaCor').value
                };
                if (!c.nome) { alert('Digite o nome!'); return; }
                const editId = document.getElementById('categoriaEditId').value;
                if (editId) { c.id = editId; const idx = categorias.findIndex(x => x.id === editId); if (idx !== -1) categorias[idx] = c; }
                else { c.id = 'cat_' + Date.now(); categorias.push(c); }
                await salvarNoFirebase('custos_categorias', c);
                saveLocalData();
                window.fecharModal('modalCategoria');
                if (nivelAtual === 'custos') { carregarCategoriasLista(); carregarItensCustoLista(); carregarTabelaCustos(); atualizarGraficos(); }
            };

            window.editarCategoria = (id) => window.abrirModalCategoria(id);

            window.excluirCategoria = async function(id) {
                if (confirm('Excluir categoria?')) {
                    itensCusto = itensCusto.filter(i => i.categoriaId !== id);
                    categorias = categorias.filter(c => c.id !== id);
                    await excluirDoFirebase('custos_categorias', id);
                    saveLocalData();
                    if (nivelAtual === 'custos') { carregarCategoriasLista(); carregarItensCustoLista(); carregarTabelaCustos(); atualizarGraficos(); }
                }
            };

            // ==================== CRUD ITENS ====================
            function carregarSelectCategorias() {
                const sel = document.getElementById('itemCategoria');
                if (sel) sel.innerHTML = categorias.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
            }

            window.abrirModalItemCusto = function(id = null) {
                if (!maquinaAtual || !periodoAtual) { alert('Selecione setor e período!'); return; }
                carregarSelectCategorias();
                document.getElementById('modalItemCusto').classList.add('active');
                if (id) {
                    const item = itensCusto.find(i => i.id === id);
                    if (item) {
                        document.getElementById('modalItemTitulo').innerText = 'Editar Item';
                        document.getElementById('itemEditId').value = item.id;
                        document.getElementById('itemCategoria').value = item.categoriaId || '';
                        document.getElementById('itemNome').value = item.nome;
                        document.getElementById('itemValorTotal').value = item.valorTotal;
                        document.getElementById('itemPercentual').value = item.percentual;
                        document.getElementById('itemObs').value = item.obs || '';
                    }
                } else {
                    document.getElementById('modalItemTitulo').innerText = 'Novo Item';
                    document.getElementById('itemEditId').value = '';
                    document.getElementById('itemNome').value = '';
                    document.getElementById('itemValorTotal').value = '';
                    document.getElementById('itemPercentual').value = '100';
                    document.getElementById('itemObs').value = '';
                }
            };

            window.salvarItemCusto = async function() {
                const item = {
                    maquinaId: maquinaAtual.id,
                    periodoMes: periodoAtual.mes,
                    periodoAno: periodoAtual.ano,
                    categoriaId: document.getElementById('itemCategoria').value,
                    nome: document.getElementById('itemNome').value.trim(),
                    valorTotal: parseFloat(document.getElementById('itemValorTotal').value) || 0,
                    percentual: parseFloat(document.getElementById('itemPercentual').value) || 100,
                    obs: document.getElementById('itemObs').value.trim(),
                    createdAt: new Date().toISOString()
                };
                if (!item.nome) { alert('Digite o nome do item!'); return; }
                const editId = document.getElementById('itemEditId').value;
                if (editId) { item.id = editId; const idx = itensCusto.findIndex(i => i.id === editId); if (idx !== -1) itensCusto[idx] = item; }
                else { item.id = 'item_' + Date.now(); itensCusto.push(item); }
                await salvarNoFirebase('custos_itens', item);
                saveLocalData();
                window.fecharModal('modalItemCusto');
                renderizarCustos();
            };

            window.editarItemCusto = (id) => window.abrirModalItemCusto(id);

            window.excluirItemCusto = async function(id) {
                if (confirm('Excluir item?')) {
                    itensCusto = itensCusto.filter(i => i.id !== id);
                    await excluirDoFirebase('custos_itens', id);
                    saveLocalData();
                    renderizarCustos();
                }
            };

            // ==================== PRODUÇÃO ====================
            window.abrirModalProducao = function() {
                if (!maquinaAtual || !periodoAtual) { alert('Selecione setor e período!'); return; }
                document.getElementById('modalProducao').classList.add('active');
                document.getElementById('producaoProduto').value = '';
                document.getElementById('producaoKg').value = '';
                document.getElementById('producaoData').value = new Date().toISOString().split('T')[0];
            };

            window.salvarProducao = async function() {
                const prod = {
                    maquinaId: maquinaAtual.id,
                    periodoMes: periodoAtual.mes,
                    periodoAno: periodoAtual.ano,
                    produto: document.getElementById('producaoProduto').value.trim(),
                    kg: parseFloat(document.getElementById('producaoKg').value) || 0,
                    data: document.getElementById('producaoData').value,
                    createdAt: new Date().toISOString(),
                    id: 'prod_' + Date.now()
                };
                if (!prod.produto || prod.kg <= 0) { alert('Preencha material e quantidade!'); return; }
                producoes.push(prod);
                await salvarNoFirebase('custos_producoes', prod);
                saveLocalData();
                window.fecharModal('modalProducao');
                renderizarCustos();
            };

            window.excluirProducao = async function(id) {
                if (confirm('Excluir produção?')) {
                    producoes = producoes.filter(p => p.id !== id);
                    await excluirDoFirebase('custos_producoes', id);
                    saveLocalData();
                    renderizarCustos();
                }
            };

            // ==================== CONFIGURAÇÃO DE CAMPOS ====================
            window.abrirConfigCampos = function() {
                document.getElementById('modalConfigCampos').classList.add('active');
                const lista = document.getElementById('listaConfigCampos');
                lista.innerHTML = Object.entries(configCampos).map(([key, val]) => `
                    <div class="form-group">
                        <label>${key} <span class="nome-original">(original: ${key})</span></label>
                        <input type="text" id="config_${key}" value="${val}">
                    </div>
                `).join('');
            };

            window.salvarConfigCampos = function() {
                Object.keys(configCampos).forEach(key => {
                    const input = document.getElementById('config_' + key);
                    if (input) configCampos[key] = input.value.trim() || configCampos[key];
                });
                saveConfig();
                window.fecharModal('modalConfigCampos');
                // Reaplicar labels nos modais abertos
                document.getElementById('labelMaquinaNome').innerText = configCampos.maquinaNome;
                document.getElementById('labelMaquinaDesc').innerText = configCampos.maquinaDesc;
                document.getElementById('labelMaquinaMes').innerText = configCampos.maquinaMes;
                document.getElementById('labelMaquinaAno').innerText = configCampos.maquinaAno;
                renderizarTela();
            };

            // ==================== RELATÓRIO PDF ====================
            window.gerarRelatorioCompleto = async function() {
                if (!maquinaAtual || !periodoAtual) { alert('Selecione setor e período!'); return; }
                showLoading();
                const { jsPDF } = window.jspdf;
                const { totalCusto, totalKg, porCategoria, itensCalculados } = calcularCustosPeriodo();
                const custoPorKg = totalKg > 0 ? totalCusto / totalKg : 0;
                const nomeMes = getNomeMes(periodoAtual.mes);

                // Capturar gráficos
                const pieCanvas = document.getElementById('pieChart');
                const barCanvas = document.getElementById('barChart');
                const pieImg = pieCanvas?.toDataURL('image/png') || null;
                const barImg = barCanvas?.toDataURL('image/png') || null;

                const pdf = new jsPDF('p', 'mm', 'a4');
                let y = 18;

                // Cabeçalho
                pdf.setFillColor(13, 144, 79);
                pdf.rect(0, 0, 210, 35, 'F');
                pdf.setTextColor(255, 255, 255);
                pdf.setFontSize(18);
                pdf.text('Central de Custos - Mil Plásticos', 105, 15, { align: 'center' });
                pdf.setFontSize(10);
                pdf.text('Reciclagem de Plásticos', 105, 24, { align: 'center' });
                y = 42;

                pdf.setTextColor(0, 0, 0);
                pdf.setFontSize(14);
                pdf.text(`${maquinaAtual.nome} - ${nomeMes}/${periodoAtual.ano}`, 105, y, { align: 'center' });
                y += 8;
                pdf.setFontSize(9);
                pdf.text(`Emitido: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}`, 105, y, { align: 'center' });
                y += 12;

                // Cards de resumo
                pdf.setFillColor(240, 248, 240);
                pdf.rect(20, y, 170, 30, 'F');
                pdf.setFontSize(10);
                pdf.text(`${configCampos.custoTotal}: ${formatMoney(totalCusto)}`, 25, y + 10);
                pdf.text(`${configCampos.producaoKg}: ${formatNumber(totalKg, 0)} kg`, 85, y + 10);
                pdf.text(`${configCampos.custoPorKg}: ${formatMoney(custoPorKg)}/kg`, 145, y + 10);
                pdf.setFontSize(8);
                pdf.text(`Itens: ${itensCalculados.length} | Categorias: ${Object.keys(porCategoria).length}`, 25, y + 22);
                y += 38;

                // Gráficos
                if (pieImg || barImg) {
                    if (pieImg) {
                        pdf.setFontSize(11);
                        pdf.text('Distribuição por Categoria', 105, y, { align: 'center' });
                        y += 4;
                        pdf.addImage(pieImg, 'PNG', 55, y, 100, 70);
                        y += 75;
                    }
                    if (y > 230) { pdf.addPage(); y = 20; }
                    if (barImg) {
                        pdf.setFontSize(11);
                        pdf.text('Comparativo por Categoria', 105, y, { align: 'center' });
                        y += 4;
                        pdf.addImage(barImg, 'PNG', 55, y, 100, 70);
                        y += 75;
                    }
                }

                if (y > 250) { pdf.addPage(); y = 20; }
                pdf.setFontSize(12);
                pdf.text('Detalhamento dos Custos', 105, y, { align: 'center' });
                y += 8;

                // Tabela
                const body = [];
                for (const catId in porCategoria) {
                    const g = porCategoria[catId];
                    body.push([{ content: g.nome, colSpan: 4, styles: { fillColor: [230, 245, 230], fontStyle: 'bold' } }]);
                    g.itens.forEach(item => {
                        body.push([item.nome, formatMoney(item.valorTotal), `${item.percentual}%`, formatMoney(item.valorTotal * item.percentual / 100)]);
                    });
                }

                pdf.autoTable({
                    startY: y,
                    head: [['Item', 'Valor Total', '%', 'Aplicado']],
                    body: body,
                    theme: 'grid',
                    headStyles: { fillColor: [13, 144, 79], textColor: 255, fontSize: 9 },
                    bodyStyles: { fontSize: 8 },
                    margin: { left: 20, right: 20 }
                });

                // Rodapé
                const pageCount = pdf.internal.getNumberOfPages();
                for (let i = 1; i <= pageCount; i++) {
                    pdf.setPage(i);
                    pdf.setFontSize(7);
                    pdf.setTextColor(150);
                    pdf.text(`Mil Plásticos - Relatório de Custos - ${maquinaAtual.nome} - Pág. ${i}/${pageCount}`, 105, 290, { align: 'center' });
                }

                pdf.save(`Central_Custos_${maquinaAtual.nome}_${nomeMes}_${periodoAtual.ano}.pdf`);
                hideLoading();
            };

            // ==================== UTILITÁRIOS MODAL ====================
            window.fecharModal = function(id) {
                document.getElementById(id).classList.remove('active');
            };

            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('modal-overlay')) {
                    e.target.classList.remove('active');
                }
            });

            // ==================== INIT ====================
            function init() {
                renderizarTela();
                hideLoading();
            }

            init();
        })();
    </script>
    <script src="/js/main.js"></script>
</body>
</html>
