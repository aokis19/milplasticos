<!-- components/topbar.html -->
<header class="topbar">
  <button id="sidebar-toggle" class="toggle-btn">
    <i class="fas fa-bars"></i>
  </button>
  
  <div class="topbar-brand">
    <i class="fas fa-industry"></i>
    <span>Sistema de Gestão</span>
  </div>
  
  <div class="search-container">
    <i class="fas fa-search"></i>
    <input type="text" class="search-input" placeholder="Buscar no sistema...">
  </div>
  
  <div class="topbar-actions">
    <button class="action-btn" title="Notificações">
      <i class="fas fa-bell"></i>
      <span class="badge">3</span>
    </button>
    <button class="action-btn" title="Ajuda">
      <i class="fas fa-question-circle"></i>
    </button>
    <button class="action-btn user-btn">
      <i class="fas fa-user-circle"></i>
      <span>Admin</span>
    </button>
  </div>
</header>

<div id="overlay" class="overlay"></div>
