<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Manutenção | Mil Plásticos</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/sidebar.css">
    <link rel="stylesheet" href="/assets/css/topbar.css">
    <link rel="stylesheet" href="/assets/css/manutencao.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="topbar-container"></div>
    <div class="container">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-container">
                <!-- Cabeçalho -->
                <div class="page-header">
                    <h1><i class="fas fa-tools"></i> Controle de Manutenção</h1>
                    <div class="page-actions">
                        <button class="btn btn-success" id="btnNovaManutencao">
                            <i class="fas fa-plus"></i> Registrar Manutenção
                        </button>
                        <button class="btn btn-primary" id="btnConfigurarTipos">
                            <i class="fas fa-cog"></i> Configurar Tipos
                        </button>
                    </div>
                </div>
                
                <!-- Alertas -->
                <div id="alertasContainer" style="display: none;"></div>
                
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="historico">📋 Histórico</button>
                    <button class="tab-btn" data-tab="proximas">⏰ Próximas</button>
                    <button class="tab-btn" data-tab="config">⚙️ Configurações</button>
                </div>
                
                <!-- Tab Histórico -->
                <div class="tab-content active" id="tab-historico">
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-history"></i> Histórico de Manutenções</h2>
                            <div class="search-box">
                                <input type="text" id="searchHistorico" placeholder="Buscar...">
                            </div>
                        </div>
                        <div class="card-body table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Data</th>
                                        <th>Veículo</th>
                                        <th>Tipo</th>
                                        <th>KM/Hora</th>
                                        <th>Próxima</th>
                                        <th>Status</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="historicoBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <!-- Tab Próximas -->
                <div class="tab-content" id="tab-proximas">
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-calendar-alt"></i> Próximas Manutenções</h2>
                        </div>
                        <div class="card-body" id="proximasBody"></div>
                    </div>
                </div>
                
                <!-- Tab Configurações -->
                <div class="tab-content" id="tab-config">
                    <!-- Veículos -->
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-truck"></i> Veículos</h2>
                            <button class="btn btn-primary btn-sm" id="btnNovoVeiculo">
                                <i class="fas fa-plus"></i> Novo Veículo
                            </button>
                        </div>
                        <div class="card-body" id="veiculosList"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- MODAL: Registrar Manutenção -->
    <div id="modalManutencao" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3><i class="fas fa-tools"></i> Registrar Manutenção</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="formManutencao">
                    <div class="form-group">
                        <label>Veículo *</label>
                        <select id="veiculoSelect" required>
                            <option value="">Selecione...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Manutenção *</label>
                        <select id="tipoSelect" required>
                            <option value="">Selecione primeiro o veículo</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Data *</label>
                            <input type="date" id="dataManutencao" required>
                        </div>
                        <div class="form-group">
                            <label>KM/Hora Atual *</label>
                            <input type="number" id="kmAtual" step="1" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="obsManutencao" rows="3"></textarea>
                    </div>
                    <div class="form-footer">
                        <button type="button" class="btn btn-secondary modal-close">Cancelar</button>
                        <button type="submit" class="btn btn-success">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- MODAL: Configurar Tipos -->
    <div id="modalConfigTipos" class="modal-overlay">
        <div class="modal-container modal-lg">
            <div class="modal-header">
                <h3><i class="fas fa-cog"></i> Configurar Tipos de Manutenção</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Veículo</label>
                    <select id="configVeiculoSelect">
                        <option value="">Selecione um veículo</option>
                    </select>
                </div>
                <div id="tiposList" style="margin-top: 20px;"></div>
                <button class="btn btn-success btn-sm" id="btnAddTipo" style="margin-top: 15px;">
                    <i class="fas fa-plus"></i> Adicionar Tipo
                </button>
            </div>
        </div>
    </div>
    
    <!-- MODAL: Novo Veículo -->
    <div id="modalNovoVeiculo" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3><i class="fas fa-plus"></i> Novo Veículo</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nome do Veículo *</label>
                    <input type="text" id="novoVeiculoNome" placeholder="Ex: Empilhadeira 01">
                </div>
                <div class="form-group">
                    <label>Tipo de Unidade</label>
                    <select id="novoVeiculoUnidade">
                        <option value="KM">KM (Quilômetros)</option>
                        <option value="HORAS">Horas (Máquinas)</option>
                    </select>
                </div>
                <div class="form-footer">
                    <button class="btn btn-secondary modal-close">Cancelar</button>
                    <button class="btn btn-primary" id="salvarNovoVeiculo">Salvar</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
<!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<!-- Seu helper existente -->
    <script src="/assets/js/manutencao-helper.js"></script>

<!-- Seu main.js existente -->
    <script src="/assets/js/main.js"></script>

<!-- NOVO manut.js (substitui o antigo manut.js) -->
    <script src="/assets/js/manut.js"></script>
</body>
</html>
