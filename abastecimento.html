<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- Tudo centralizado aqui -->
  {% include "components/head.html" %}
  
  <title>Central de Abastecimento | Mil Plásticos</title>
  
  <!-- APENAS CSS específico da página -->
  <link rel="stylesheet" href="/assets/css/abastecimento.css">
  
  <!-- APENAS bibliotecas específicas da página -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <!-- Topbar Container -->
  <div id="topbar-container"></div>

  <!-- Container principal -->
  <div class="container">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <!-- Conteúdo principal -->
    <main class="main-content">
      <div class="page-container">

        <!-- Cabeçalho da página -->
        <div class="page-header">
          <h1><i class="fas fa-gas-pump"></i> Controle de Abastecimento</h1>
          <p>Registre e acompanhe os abastecimentos da frota</p>
          <div class="page-actions">
            <button class="btn btn-secondary" id="btnExportAbastecimento">
              <i class="fas fa-file-export"></i> Exportar
            </button>
            <button class="btn btn-primary" id="btnRelatorioConsumo">
              <i class="fas fa-chart-line"></i> Relatório Consumo
            </button>
            <button class="btn btn-success" id="btnNovoAbastecimento">
              <i class="fas fa-plus"></i> Novo Abastecimento
            </button>
          </div>
        </div>

        <!-- Card de Filtros -->
        <div class="card card-filters">
          <div class="card-header">
            <h3><i class="fas fa-filter"></i> Filtros</h3>
          </div>
          <div class="card-body">
            <div class="filter-grid">
              <div class="form-group">
                <label for="filtroVeiculo"><i class="fas fa-truck"></i> Veículo</label>
                <select id="filtroVeiculo">
                  <option value="">Todos os veículos</option>
                </select>
              </div>
              <div class="form-group">
                <label for="filtroPeriodo"><i class="fas fa-calendar-alt"></i> Período</label>
                <select id="filtroPeriodo">
                  <option value="30">Últimos 30 dias</option>
                  <option value="7">Última semana</option>
                  <option value="hoje">Hoje</option>
                  <option value="personalizado">Personalizado</option>
                </select>
              </div>
              <div class="form-group" id="dataPersonalizadaGroup" style="display: none;">
                <label for="filtroDataInicio">Data Início</label>
                <input type="date" id="filtroDataInicio">
                <label for="filtroDataFim">Data Fim</label>
                <input type="date" id="filtroDataFim">
              </div>
              <div class="form-group">
                <label for="filtroCombustivel"><i class="fas fa-gas-pump"></i> Combustível</label>
                <select id="filtroCombustivel">
                  <option value="">Todos</option>
                  <option value="Gasolina">Gasolina</option>
                  <option value="Etanol">Etanol</option>
                  <option value="Diesel S10">Diesel S10</option>
                  <option value="Diesel S500">Diesel S500</option>
                </select>
              </div>
              <div class="form-actions">
                <button class="btn btn-secondary" id="btnLimparFiltros"><i class="fas fa-broom"></i> Limpar</button>
                <button class="btn btn-primary" id="btnAplicarFiltros"><i class="fas fa-search"></i> Filtrar</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Card de Estatísticas Rápidas -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-gas-pump"></i></div>
            <div class="stat-info">
              <h3 id="totalAbastecimentos">0</h3>
              <p>Abastecimentos</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div>
            <div class="stat-info">
              <h3 id="totalValor">R$ 0,00</h3>
              <p>Total Gasto</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-oil-can"></i></div>
            <div class="stat-info">
              <h3 id="totalLitros">0 L</h3>
              <p>Total Litros</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-info">
              <h3 id="mediaPreco">R$ 0,00/L</h3>
              <p>Preço Médio</p>
            </div>
          </div>
        </div>

        <!-- ABAS -->
        <div class="tabs-container">
          <div class="tabs">
            <button class="tab-btn active" data-tab="historico">
              <i class="fas fa-history"></i> Histórico
            </button>
            <button class="tab-btn" data-tab="consumo-veiculos">
              <i class="fas fa-chart-line"></i> Consumo por Veículo
            </button>
            <button class="tab-btn" data-tab="estatisticas">
              <i class="fas fa-chart-bar"></i> Estatísticas
            </button>
          </div>
        </div>

        <!-- ABA 1: HISTÓRICO -->
        <div class="tab-content active" id="historico">
          <!-- ... conteúdo existente ... -->
        </div>

        <!-- ABA 2: CONSUMO POR VEÍCULO -->
        <div class="tab-content" id="consumo-veiculos">
          <!-- ... conteúdo existente ... -->
        </div>

        <!-- ABA 3: ESTATÍSTICAS -->
        <div class="tab-content" id="estatisticas">
          <!-- ... conteúdo existente ... -->
        </div>

        <!-- Modal de Detalhes -->
        <div id="modalDetalhes" class="modal">
          <!-- ... conteúdo existente ... -->
        </div>

      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="/js/main.js"></script>
  <script src="/js/abastecimento.js"></script>
</body>
</html>
